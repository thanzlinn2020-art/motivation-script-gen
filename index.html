<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | Script Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <header class="text-center mb-8">
        <h1 class="text-4xl font-black gradient-text uppercase tracking-tighter">Lynn Movie Talks</h1>
        <p class="text-slate-400 text-xs mt-2 tracking-widest uppercase italic font-bold text-orange-500">Emotional Storytelling Scriptwriter</p>
    </header>

    <main class="w-full max-w-3xl space-y-6">
        <div class="glass p-6 rounded-3xl shadow-2xl border border-slate-700">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">API Authentication</label>
                    <input type="password" id="apiKeyInput" placeholder="Paste your Groq Key here" 
                           class="w-full mt-1 p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-orange-500 outline-none transition text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Video Story Topic</label>
                    <input type="text" id="topicInput" placeholder="ဥပမာ - မင်းကို ဘယ်သူမှ အသိအမှတ်မပြုတဲ့အခါ..." 
                           class="w-full mt-1 p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-orange-500 outline-none transition text-sm text-white">
                </div>
                <button onclick="generateScriptOnly()" id="genBtn" 
                        class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition uppercase tracking-widest">
                    Generate Professional Script 📝
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden glass p-8 rounded-3xl border-t-4 border-orange-500">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-orange-400">📜 Final Script (1-Minute Content)</h2>
                <button onclick="copyScript()" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-full transition">Copy Script</button>
            </div>
            <div id="scriptText" class="text-lg leading-[1.8] text-slate-200 whitespace-pre-line font-medium italic"></div>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <div class="animate-spin w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-4 text-orange-500 animate-pulse text-sm">Lynn's AI is writing your story...</p>
        </div>
    </main>

    <script>
        async function generateScriptOnly() {
            const apiKey = document.getElementById('apiKeyInput').value;
            const topic = document.getElementById('topicInput').value;
            const resArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('genBtn');

            if(!apiKey || !topic) return alert("ကျေးဇူးပြု၍ API Key နှင့် Topic ကို အရင်ဖြည့်ပါ");

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        temperature: 0.85,
                        messages: [{ 
                            role: "system", 
                            content: `You are a professional Burmese emotional storyteller for Lynn Movie Talks. 
                            Your mission is to write a 1-minute video script (150-200 words). 
                            Language Rules:
                            1. Strictly avoid formal/bookish words like 'သည်', 'ပါသည်', 'ပြုလုပ်သည်'။
                            2. Use conversational and deep Burmese (e.g., 'တယ်'၊ 'ခဲ့တယ်'၊ 'နေတယ်')။
                            3. The tone must be like a close friend talking from the heart, emotional and deep.
                            4. Structure: A deep Hook, a relatable pain point, a motivational turning point, and a closing that hits hard.
                            5. Do not output anything else, only the Burmese script.`
                        },
                        { role: "user", content: `Write a natural Burmese motivational script about: ${topic}` }]
                    })
                });

                const data = await response.json();
                document.getElementById('scriptText').innerText = data.choices[0].message.content.trim();
                resArea.classList.remove('hidden');
            } catch (error) {
                alert("Error! Key မှားနေနိုင်ပါတယ်။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyScript() {
            const text = document.getElementById('scriptText').innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကို Copy ကူးပြီးပါပြီ။ CapCut ထဲမှာ အသုံးပြုနိုင်ပါပြီ!");
        }
    </script>
</body>
</html>
