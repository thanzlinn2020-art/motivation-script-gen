<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Elite Visual Director</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Orbitron:wght@900&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .cyber-card { background: rgba(10, 10, 10, 0.8); border: 1px solid #1a1a1a; border-radius: 2.5rem; backdrop-filter: blur(20px); }
        .neon-border { box-shadow: 0 0 20px rgba(249, 115, 22, 0.15); border-top: 2px solid #f97316; }
        .glitch-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scene-badge { background: linear-gradient(90deg, #f97316, #ef4444); color: #000; font-weight: 900; }
        .prompt-chip { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 11px; }
        .copy-tag { cursor: pointer; font-size: 10px; color: #f97316; text-transform: uppercase; font-weight: bold; border: 1px solid rgba(249, 115, 22, 0.3); padding: 2px 8px; border-radius: 5px; transition: 0.3s; }
        .copy-tag:hover { background: #f97316; color: #000; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="py-16 text-center">
        <h1 class="text-6xl glitch-text italic tracking-tighter mb-2">LYNN STUDIO</h1>
        <p class="text-[9px] tracking-[0.7em] text-slate-600 uppercase font-black">AI Cinema & Visual Storyboard Engine</p>
    </header>

    <div class="w-full max-w-2xl cyber-card neon-border p-10 mb-16 shadow-2xl">
        <textarea id="topicInput" rows="2" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေး လျှို့ဝှက်ချက် (သို့) Nano Banana အကြောင်း..." 
                  class="w-full p-6 rounded-3xl bg-black border border-white/5 focus:border-orange-500 outline-none text-white text-center text-xl mb-8 placeholder:text-slate-800"></textarea>
        
        <button onclick="startDirecting()" id="genBtn" 
                class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-black py-6 rounded-3xl shadow-lg active:scale-95 transition-all uppercase tracking-[0.3em] text-sm">
            Launch Script & Prompts 🚀
        </button>
    </div>

    <div id="loader" class="hidden mb-16 text-center">
        <div class="inline-block w-10 h-10 border-2 border-orange-500/20 border-t-orange-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] text-orange-500 font-bold uppercase tracking-[0.5em] animate-pulse">Director is assembling scenes...</p>
    </div>

    <div id="resultArea" class="hidden w-full max-w-4xl space-y-24 pb-40">
        <div id="sceneContainer" class="space-y-20"></div>
    </div>

    <script>
        // မင်းရဲ့ API Key အသစ်ကို ဒီမှာ ထည့်ပေးပါ
        const API_KEY = "AIzaSyAXZgowXrlzhNSXAsQ6RbuLljpbXw5bqkg"; 

        async function startDirecting() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const container = document.getElementById('sceneContainer');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');
            container.innerHTML = "";

            try {
                // v1beta version နဲ့ Gemini 1.5 Flash Model ကို အသုံးပြုထားပါတယ်
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အတွက် TikTok Scene ၃ ခုစာ Storyboard ကို မြန်မာလို ရေးပေးပါ။ format က Scene တစ်ခုချင်းစီအတွက် အောက်ပါအတိုင်း သေချာခွဲပေးပါ -
                        Scene [နံပါတ်]:
                        Script: [စကားပြော Script]
                        Concept: [ပုံဖော်ရမယ့် မြင်ကွင်းကို မြန်မာလို ရှင်းပြချက်]
                        Image Prompt: [English Cinematic Prompt for AI]
                        Animation: [Grok/Luma AI Movement Prompt in English]` }] }]
                    })
                });

                const data = await response.json();
                if(!data.candidates) throw new Error(data.error?.message || "Check VPN Connection");

                const rawText = data.candidates[0].content.parts[0].text;
                const scenes = rawText.split(/Scene\s*\d+\s*:?/i).filter(s => s.trim().length > 30);

                scenes.forEach((block, i) => {
                    const script = extract(block, "Script:");
                    const concept = extract(block, "Concept:");
                    const prompt = extract(block, "Image Prompt:");
                    const anim = extract(block, "Animation:");

                    container.innerHTML += `
                        <div class="cyber-card p-10 space-y-10 border-l-8 border-l-orange-600 shadow-2xl animate-fade-in">
                            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                                <span class="scene-badge px-5 py-1 rounded-lg text-[11px] uppercase tracking-tighter italic">Scene 0${i+1}</span>
                                <div class="text-[9px] text-slate-700 font-mono tracking-widest uppercase">Cam: 35mm Cinematic</div>
                            </div>

                            <div class="space-y-4">
                                <div class="flex justify-between items-center"><p class="text-[10px] text-orange-500 font-black uppercase tracking-widest">Burmese Voiceover</p><span class="copy-tag" onclick="copyText(this)">Copy Script</span></div>
                                <p class="text-2xl leading-relaxed text-slate-100 italic font-medium select-all">${script}</p>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="prompt-chip bg-black/50">
                                    <div class="flex justify-between mb-3"><p class="text-[8px] text-slate-500 font-bold uppercase">Visual Concept (MM)</p></div>
                                    <p class="text-xs text-slate-400 leading-relaxed">${concept}</p>
                                </div>
                                <div class="prompt-chip bg-black/50 border-orange-500/10">
                                    <div class="flex justify-between mb-3"><p class="text-[8px] text-orange-500/60 font-bold uppercase tracking-widest">Image Generation Prompt (EN)</p><span class="copy-tag !text-[8px]" onclick="copyText(this)">Copy</span></div>
                                    <p class="text-[10px] text-slate-300 font-mono leading-tight">${prompt}</p>
                                </div>
                            </div>

                            <div class="prompt-chip bg-cyan-950/10 border-cyan-500/20">
                                <div class="flex justify-between mb-2"><p class="text-[8px] text-cyan-500 font-bold uppercase tracking-[0.2em]">Animation Dynamics (Luma/Grok)</p><span class="copy-tag !text-[8px] !text-cyan-500" onclick="copyText(this)">Copy</span></div>
                                <p class="text-[10px] text-slate-400 font-mono italic">${anim}</p>
                            </div>
                        </div>
                    `;
                });

                resArea.classList.remove('hidden');
            } catch (e) {
                alert("🚨 Error: " + e.message + "\n\nVPN (Singapore/USA) ချိတ်ထားဖို့ သေချာပါစေ။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function extract(text, field) {
            const regex = new RegExp(`${field.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\s*([\\s\\S]*?)(?=\\n\\w+:|$)`, 'i');
            const match = text.match(regex);
            return match ? match[1].trim() : "Director is generating data...";
        }

        function copyText(btn) {
            const text = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(text);
            const original = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = original, 2000);
        }
    </script>
</body>
</html>
