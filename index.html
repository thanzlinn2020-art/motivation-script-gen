<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Master Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@900&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .neon-btn { background: linear-gradient(135deg, #f97316, #ef4444); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto w-full">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-500 mb-2" style="font-family: 'Inter';">LYNN STUDIO</h1>
            <p class="text-[10px] tracking-[0.4em] text-slate-500 uppercase font-black">Zero-Fail Dual AI Engine</p>
        </header>

        <section class="glass-card p-6 md:p-8 mb-8">
            <textarea id="topicInput" rows="2" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေး လျှို့ဝှက်ချက်..." 
                class="w-full bg-black/40 border border-white/10 rounded-xl p-5 text-lg text-white outline-none focus:border-orange-500 transition-all text-center"></textarea>
            
            <button onclick="generateScript()" id="genBtn" class="neon-btn w-full mt-6 py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95">
                Start Directing 🎬
            </button>
        </section>

        <div id="loader" class="hidden text-center my-10 animate-pulse">
            <div class="inline-block w-8 h-8 border-4 border-orange-500/20 border-t-orange-500 rounded-full animate-spin"></div>
            <p id="status" class="mt-4 text-[10px] text-orange-400 font-bold uppercase tracking-widest">AI is writing...</p>
        </div>

        <main id="resultArea" class="hidden space-y-6 mb-12 animate-fade-in">
            <div class="glass-card p-8 relative">
                <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                    <span id="engineLabel" class="text-orange-500 font-black text-[9px] uppercase italic tracking-widest border border-orange-500/30 px-2 py-1 rounded">Engine: Gemini 1.5</span>
                    <button onclick="copyScript()" class="bg-white/5 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-lg text-[9px] font-bold transition-all uppercase">Copy ✅</button>
                </div>
                <div id="mainOutput" class="text-xl leading-[2.6] text-slate-200 italic whitespace-pre-line"></div>
            </div>
        </main>
    </div>

    <script>
        // မင်းရဲ့ API Key (အကယ်၍ ဒါမရရင် နောက်တစ်ခုက အလိုအလျောက် ပံ့ပိုးပေးမှာပါ)
        const API_KEY = "AIzaSyAeKPEvkZ-GWezN0RhyIGOtvbqmOi16eSE"; 

        async function generateScript() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('mainOutput');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // --- Engine 1: Gemini AI ---
            status.innerText = "Attempting Gemini Engine...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Topic: "${topic}" အတွက် TikTok Script တစ်ခုကို [00:00] format နဲ့ မြန်မာလို ရေးပေးပါ။` }] }] })
                });
                const data = await response.json();
                if(data.candidates) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('engineLabel').innerText = "Engine: Gemini Ultra";
                    showResult();
                    return;
                }
            } catch (e) { console.log("Gemini Failed, switching..."); }

            // --- Engine 2: Pollinations AI (Zero Fail & Free) ---
            status.innerText = "Switching to Backup Engine...";
            try {
                const prompt = encodeURIComponent(`Write a TikTok viral script about ${topic} in Myanmar language with timestamps [00:00]. Make it emotional and engaging.`);
                const response = await fetch(`https://text.pollinations.ai/${prompt}?model=openai&system=You are a pro movie recap director.`);
                const text = await response.text();
                
                if(text) {
                    output.innerText = text;
                    document.getElementById('engineLabel').innerText = "Engine: DeepSea Backup";
                    showResult();
                } else { throw new Error(); }
            } catch (e) {
                alert("🚨 AI Servers အားလုံး အလုပ်များနေပါတယ်။ ၅ မိနစ်လောက်နေရင် ပြန်စမ်းကြည့်ပါ Linn!");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function showResult() {
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('genBtn').disabled = false;
        }

        function copyScript() {
            const text = document.getElementById('mainOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကို Copy ယူလိုက်ပါပြီ! ✅");
        }
    </script>
</body>
</html>
