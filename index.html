<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #fb923c, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 text-center">

    <header class="mb-10">
        <h1 class="text-6xl font-black gradient-text uppercase tracking-tighter italic">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase">Universal AI Engine</p>
    </header>

    <div class="w-full max-w-2xl glass-panel p-10 rounded-[2.5rem] shadow-2xl">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="Enter topic..." 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-800 focus:border-amber-500 outline-none transition text-white text-center text-lg">
            
            <button onclick="generateEliteScript()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-5 rounded-2xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all uppercase tracking-widest text-sm">
                Generate Elite Script ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-12">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-orange-500 font-bold text-[10px] tracking-widest animate-pulse uppercase">Thinking...</p>
        </div>

        <div id="resultArea" class="hidden mt-12 p-8 bg-black/40 rounded-[2rem] border border-slate-800/50">
            <div id="outputText" class="text-lg md:text-xl leading-[2.2] text-slate-200 whitespace-pre-line text-left"></div>
            <button onclick="copyToClipboard()" class="mt-8 w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl text-xs font-bold transition uppercase">Copy</button>
        </div>
    </div>

    <script>
        // အသစ်ထုတ်ထားတဲ့ API Key ကို ဒီမှာ ထည့်ပါ
        const API_KEY = "AIzaSyAtwMEKU9ig1-NRVdekA38lfwgRhIBjeqs"; 

        async function generateEliteScript() {
            const topic = document.getElementById('topicInput').value;
            const output = document.getElementById('outputText');
            const resArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('genBtn');

            if(!topic) return;

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // Model name ကို လုံးဝအခြေခံကျတဲ့ gemini-pro လို့ ပြောင်းထားပါတယ်
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အပေါ်မှာ ရင်ထဲရောက်မယ့် ၁ မိနစ်စာ Video Script တစ်ခု ရေးပေးပါ။ (သည်၊ ပါသည် မသုံးပါနဲ့၊ စကားပြော style ပဲ သုံးပါ)`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    output.innerText = "Error: " + data.error.message + "\n\nTip: Google AI Studio မှာ API Key အသစ်တစ်ခု ထပ်ထုတ်ကြည့်ပါ။";
                } else if (data.candidates && data.candidates[0]) {
                    const script = data.candidates[0].content.parts[0].text;
                    output.innerText = script;
                } else {
                    output.innerText = "Check your VPN and Key.";
                }
                resArea.classList.remove('hidden');
            } catch (error) {
                output.innerText = "Connection Failed. Change VPN to USA.";
                resArea.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('outputText').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
