<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@800&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #050505; color: #f3f4f6; }
        .pro-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 2rem; transition: 0.3s; }
        .pro-card:hover { border-color: #f97316; }
        .inner-box { background: #000; border: 1px solid #151515; border-radius: 1.2rem; }
        .gradient-btn { background: linear-gradient(135deg, #f97316, #ef4444); box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); }
        .copy-btn { font-size: 10px; cursor: pointer; color: #64748b; font-weight: bold; border: 1px solid #1e293b; padding: 4px 10px; border-radius: 6px; }
        .copy-btn:active { background: #f97316; color: #000; border-color: #f97316; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="py-12 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-orange-500 mb-2" style="font-family: 'Inter';">LYNN STUDIO</h1>
        <p class="text-[9px] tracking-[0.5em] text-slate-600 uppercase font-black">Professional Content Engine v11.0</p>
    </header>

    <div class="w-full max-w-2xl pro-card p-8 mb-12 shadow-2xl border-t-2 border-t-orange-500/50">
        <textarea id="topicInput" rows="2" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေး လျှို့ဝှက်ချက်..." 
                  class="w-full p-5 rounded-2xl bg-black border border-white/5 focus:border-orange-500 outline-none text-white text-center text-lg mb-6"></textarea>
        
        <button onclick="startProduction()" id="genBtn" 
                class="w-full gradient-btn text-white font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest text-xs">
            Build Advanced Storyboard
        </button>
    </div>

    <div id="loader" class="hidden mb-12 text-center">
        <div class="inline-block w-8 h-8 border-2 border-orange-500/20 border-t-orange-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] text-orange-500 font-bold uppercase tracking-[0.3em] animate-pulse">Director is Crafting Your Masterpiece...</p>
    </div>

    <div id="resultArea" class="hidden w-full max-w-3xl space-y-16 pb-32">
        <div id="sceneContainer" class="space-y-16"></div>
    </div>

    <script>
        // မင်းပေးထားတဲ့ Key အသစ်ကို ထည့်သွင်းထားပါတယ်
        const API_KEY = "AIzaSyAXZgowXrlzhNSXAsQ6RbuLljpbXw5bqkg"; 

        async function startProduction() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const container = document.getElementById('sceneContainer');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');
            container.innerHTML = "";

            try {
                // v1beta version နဲ့ Gemini 1.5 Flash Model ကို သုံးထားပါတယ်
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Director ပါ။ Topic: "${topic}" အတွက် TikTok Viral ဖြစ်မယ့် Scene ၃ ခုစာ Storyboard ကို မြန်မာလို ရေးပေးပါ။ format က Scene တစ်ခုချင်းစီအတွက် အောက်ပါအတိုင်း (စာလုံးပေါင်းမမှားစေဘဲ) တိတိကျကျ ရေးပေးပါ။
                        Scene [Number]:
                        Script: [Burmese Script]
                        Concept: [Burmese Visual Description]
                        Prompt: [Professional English Visual Prompt]
                        Animation: [Movement Instruction in English]` }] }]
                    })
                });

                const data = await response.json();
                if (!data.candidates) throw new Error(data.error?.message || "Response Failed");
                
                const rawText = data.candidates[0].content.parts[0].text;
                const scenes = rawText.split(/Scene\s*\d+\s*:?/i).filter(s => s.trim().length > 30);

                scenes.forEach((block, i) => {
                    const script = extractField(block, "Script:");
                    const concept = extractField(block, "Concept:");
                    const prompt = extractField(block, "Prompt:");
                    const anim = extractField(block, "Animation:");

                    container.innerHTML += `
                        <div class="pro-card p-8 space-y-8 shadow-xl border-l-4 border-l-orange-500">
                            <div class="flex items-center justify-between border-b border-white/5 pb-4">
                                <span class="bg-orange-500 text-black px-4 py-1 rounded-md text-[10px] font-black uppercase">SCENE ${i+1}</span>
                                <span class="text-[9px] text-slate-600 font-mono tracking-widest">LYNN MOVIE TALKS</span>
                            </div>

                            <div class="space-y-3">
                                <div class="flex justify-between items-center"><p class="text-[10px] text-orange-500 font-black uppercase tracking-[0.2em]">Burmese Script</p><button class="copy-btn" onclick="copyThis(this)">COPY</button></div>
                                <p class="text-xl leading-[1.8] text-slate-100 font-medium italic select-all">${script}</p>
                            </div>

                            <div class="inner-box p-6 space-y-6 bg-black/40">
                                <div>
                                    <p class="text-[8px] text-slate-500 font-black uppercase mb-2">Visual Concept (Myanmar)</p>
                                    <p class="text-sm text-slate-400 leading-relaxed">${concept}</p>
                                </div>
                                <div class="h-[1px] bg-white/5"></div>
                                <div>
                                    <div class="flex justify-between items-center mb-2"><p class="text-[8px] text-cyan-500 font-black uppercase">AI Image Prompt (English)</p><button class="copy-btn" onclick="copyThis(this)">COPY</button></div>
                                    <p class="text-xs text-slate-300 font-mono leading-relaxed select-all">${prompt}</p>
                                </div>
                                <div class="h-[1px] bg-white/5"></div>
                                <div>
                                    <div class="flex justify-between items-center mb-2"><p class="text-[8px] text-pink-500 font-black uppercase">Animation Movement</p><button class="copy-btn" onclick="copyThis(this)">COPY</button></div>
                                    <p class="text-xs text-slate-300 font-mono leading-relaxed select-all">${anim}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                resArea.classList.remove('hidden');
            } catch (e) {
                alert("🚨 Error: " + e.message + "\n\nVPN ကို Singapore/USA ချိတ်ထားဖို့ သေချာပါစေ။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function extractField(text, field) {
            const regex = new RegExp(`${field.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\s*([\\s\\S]*?)(?=\\n\\w+:|$)`, 'i');
            const match = text.match(regex);
            return match ? match[1].trim() : "Data missing...";
        }

        function copyThis(btn) {
            const text = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(text);
            const original = btn.innerText;
            btn.innerText = "DONE!";
            btn.style.borderColor = "#f97316";
            btn.style.color = "#f97316";
            setTimeout(() => {
                btn.innerText = original;
                btn.style.borderColor = "#1e293b";
                btn.style.color = "#64748b";
            }, 1500);
        }
    </script>
</body>
</html>
