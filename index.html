<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Master Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #fb923c, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 text-center">

    <header class="mb-10">
        <h1 class="text-6xl font-black gradient-text uppercase tracking-tighter italic">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase">Universal AI Auto-Switcher</p>
    </header>

    <div class="w-full max-w-2xl glass p-10 rounded-[2.5rem] shadow-2xl">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="Enter topic..." 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-800 focus:border-orange-500 outline-none transition text-white text-center text-lg">
            
            <button onclick="smartGenerate()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all uppercase tracking-widest text-sm active:scale-95">
                Generate Elite Script ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-12">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p id="statusText" class="mt-4 text-orange-500 font-bold text-[10px] tracking-widest animate-pulse uppercase">Searching for available AI model...</p>
        </div>

        <div id="resultArea" class="hidden mt-12 p-8 bg-black/40 rounded-[2rem] border border-slate-800/50">
            <div id="outputText" class="text-lg md:text-xl leading-[2.2] text-slate-200 whitespace-pre-line text-left font-medium"></div>
            <button onclick="copyToClipboard()" class="mt-8 w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl text-xs font-bold transition uppercase tracking-widest">Copy Master Script</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAtwMEKU9ig1-NRVdekA38lfwgRhIBjeqs"; 

        async function smartGenerate() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // စမ်းသပ်မယ့် Model List များ
            const models = [
                "v1beta/models/gemini-1.5-flash",
                "v1/models/gemini-1.5-flash",
                "v1beta/models/gemini-pro",
                "v1/models/gemini-pro"
            ];

            let success = false;

            for (const model of models) {
                status.innerText = `TRYING MODEL: ${model}...`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${model}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အပေါ်မှာ ရင်ထဲရောက်မယ့် ၁ မိနစ်စာ Video Script တစ်ခု ရေးပေးပါ။ (သည်၊ ပါသည် မသုံးပါနဲ့၊ စကားပြော style ပဲ သုံးပါ)` }] }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0]) {
                        output.innerText = data.candidates[0].content.parts[0].text;
                        success = true;
                        break; // အောင်မြင်ရင် loop ကနေ ထွက်မယ်
                    }
                } catch (e) {
                    console.log(`Model ${model} failed, trying next...`);
                }
            }

            if (!success) {
                output.innerText = "Error: All AI models are currently unavailable. \n\nဖြေရှင်းနည်း - \n၁။ Google AI Studio မှာ API Key အသစ်တစ်ခု ထပ်ထုတ်ကြည့်ပါ။ \n၂။ VPN Region ကို Singapore သို့မဟုတ် USA သို့ သေချာပြောင်းပါ။";
            }
            
            resArea.classList.remove('hidden');
            loader.classList.add('hidden');
            btn.disabled = false;
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('outputText').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
