<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Final Fix 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #030712; color: #f1f5f9; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #fb923c, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 text-center">

    <header class="mb-8">
        <h1 class="text-5xl font-black gradient-text uppercase tracking-tighter italic">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase">System Status: Operational</p>
    </header>

    <div class="w-full max-w-2xl glass p-8 rounded-[2rem] shadow-2xl border border-slate-800">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="ဥပမာ - ဘဝမှာ လဲကျနေတဲ့သူတွေအတွက်..." 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-800 focus:border-orange-500 outline-none transition text-white text-center text-lg">
            
            <button onclick="generateScript()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-5 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all uppercase tracking-widest text-sm">
                Generate Elite Script ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-10">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p id="statusMsg" class="mt-4 text-orange-500 font-bold text-[10px] tracking-widest animate-pulse uppercase">Connecting to Gemini...</p>
        </div>

        <div id="resultArea" class="hidden mt-10 p-6 bg-black/40 rounded-2xl border border-slate-800">
            <div id="outputText" class="text-lg md:text-xl leading-[2.2] text-slate-200 whitespace-pre-line text-left font-medium"></div>
            <button onclick="copyToClipboard()" class="mt-6 w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl text-[10px] font-bold transition uppercase tracking-widest">Copy Master Script</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDJODUNA25KgZ-oYMDf57VG54JI5QIStII"; 

        async function generateScript() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');
            const statusMsg = document.getElementById('statusMsg');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // Model အဆင့်ဆင့် စမ်းသပ်မယ့် List
            const modelPaths = [
                "v1beta/models/gemini-1.5-flash",
                "v1/models/gemini-1.5-flash",
                "v1beta/models/gemini-pro"
            ];

            let success = false;

            for (let path of modelPaths) {
                statusMsg.innerText = `Trying ${path}...`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${path}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Storyteller ပါ။ Topic: "${topic}" အပေါ်မှာ ရင်ထဲရောက်မယ့် ၁ မိနစ်စာ Video Script တစ်ခု ရေးပေးပါ။ (သည်၊ ပါသည် မသုံးပါနဲ့၊ စကားပြော style ပဲ သုံးပါ)` }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0]) {
                        output.innerText = data.candidates[0].content.parts[0].text;
                        success = true;
                        break; 
                    }
                } catch (e) { console.log("Failed: " + path); }
            }

            if (!success) {
                output.innerText = "Error: VPN ကို Singapore သို့မဟုတ် USA သေချာပြောင်းပေးပါ။ Google AI Studio ထဲမှာ Model တစ်ခုခုကို အရင်ရွေးပြီး Run ကြည့်ထားဖို့ လိုအပ်ပါတယ်။";
            }

            resArea.classList.remove('hidden');
            loader.classList.add('hidden');
            btn.disabled = false;
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Copied!");
        }
    </script>
</body>
</html>
