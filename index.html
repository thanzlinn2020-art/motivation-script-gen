<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Stable v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #000; color: #fff; }
        .pro-card { background: #0d0d0d; border: 1px solid #222; border-radius: 1.5rem; }
        .gradient-btn { background: linear-gradient(135deg, #f97316, #ef4444); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="py-10 text-center">
        <h1 class="text-4xl font-black italic text-orange-500">LYNN STUDIO</h1>
        <p class="text-[9px] tracking-widest text-slate-500 uppercase mt-2 font-bold">Stable AI Director</p>
    </header>

    <div class="w-full max-w-xl pro-card p-6 mb-10">
        <textarea id="topicInput" rows="2" placeholder="Topic ကို ဒီမှာ ရေးပါ..." 
                  class="w-full p-4 rounded-xl bg-black border border-white/10 focus:border-orange-500 outline-none text-white text-center mb-4"></textarea>
        
        <button onclick="generateContent()" id="genBtn" 
                class="w-full gradient-btn text-white font-black py-4 rounded-xl active:scale-95 transition-all uppercase text-xs">
            Generate Storyboard
        </button>
    </div>

    <div id="loader" class="hidden text-center mb-10">
        <div class="inline-block w-6 h-6 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
        <p id="statusTxt" class="mt-2 text-[10px] text-orange-400 font-bold uppercase">AI is thinking...</p>
    </div>

    <div id="resultArea" class="hidden w-full max-w-2xl space-y-10 pb-20">
        <div id="sceneList"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyAQVYjoYL3uIaDfCRdytAiNTheRfX8oOC4"; 

        async function generateContent() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const statusTxt = document.getElementById('statusTxt');
            const list = document.getElementById('sceneList');

            btn.disabled = true;
            loader.classList.remove('hidden');
            list.innerHTML = "";

            // အသေချာဆုံး v1beta version နဲ့ model list
            const models = [
                "v1beta/models/gemini-2.0-flash:generateContent",
                "v1beta/models/gemini-1.5-flash:generateContent"
            ];

            let success = false;

            for(let model of models) {
                statusTxt.innerText = `Connecting to ${model.split('/')[2]}...`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${model}?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Topic: "${topic}" အတွက် TikTok Storyboard Scene ၃ ခု ရေးပေးပါ။ မြန်မာလို Script ရော၊ English လို Image Prompt ရော ပါရမယ်။` }] }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0]) {
                        const content = data.candidates[0].content.parts[0].text;
                        // ရိုးရိုးရှင်းရှင်းပဲ ပြသမယ် (Parsing Error ကင်းအောင်)
                        list.innerHTML = `<div class="p-6 pro-card bg-black/50 text-slate-200 leading-relaxed whitespace-pre-line">${content}</div>`;
                        success = true;
                        break; 
                    } else if (data.error) {
                        console.error(data.error.message);
                    }
                } catch (e) {
                    console.error("Fetch Error");
                }
            }

            if (!success) {
                list.innerHTML = `<div class="p-6 border border-red-500/50 rounded-xl text-red-400 text-sm text-center">
                    Error: AI နဲ့ ချိတ်ဆက်လို့မရပါ။ <br> (၁) VPN ချိတ်ထားလား စစ်ပါ။ <br> (၂) Internet Connection စစ်ပါ။
                </div>`;
            }

            document.getElementById('resultArea').classList.remove('hidden');
            loader.classList.add('hidden');
            btn.disabled = false;
        }
    </script>
</body>
</html>
