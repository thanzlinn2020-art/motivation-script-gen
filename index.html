<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Elite Visual Director</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Orbitron:wght@900&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .cyber-card { background: rgba(10, 10, 10, 0.8); border: 1px solid #1a1a1a; border-radius: 2.5rem; backdrop-filter: blur(20px); }
        .neon-border { box-shadow: 0 0 20px rgba(249, 115, 22, 0.15); border-top: 2px solid #f97316; }
        .glitch-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scene-badge { background: linear-gradient(90deg, #f97316, #ef4444); color: #000; font-weight: 900; }
        .prompt-chip { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 11px; }
        .copy-tag { cursor: pointer; font-size: 10px; color: #f97316; text-transform: uppercase; font-weight: bold; border: 1px solid rgba(249, 115, 22, 0.3); padding: 2px 8px; border-radius: 5px; transition: 0.3s; }
        .copy-tag:hover { background: #f97316; color: #000; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="py-16 text-center">
        <h1 class="text-6xl glitch-text italic tracking-tighter mb-2">LYNN STUDIO</h1>
        <p class="text-[9px] tracking-[0.7em] text-slate-600 uppercase font-black">AI Cinema & Visual Storyboard Engine</p>
    </header>

    <div class="w-full max-w-2xl cyber-card neon-border p-10 mb-16 shadow-2xl">
        <textarea id="topicInput" rows="2" placeholder="Topic ကို ဒီမှာ ရေးပါ..." 
                  class="w-full p-6 rounded-3xl bg-black border border-white/5 focus:border-orange-500 outline-none text-white text-center text-xl mb-8 placeholder:text-slate-800"></textarea>
        
        <button onclick="startDirecting()" id="genBtn" 
                class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-black py-6 rounded-3xl shadow-lg active
