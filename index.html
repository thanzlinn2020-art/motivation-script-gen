<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | AI Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Pyidaungsu', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #fbbf24, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto text-center mb-10">
        <h1 class="text-5xl font-black gradient-text tracking-tighter uppercase">Lynn Movie Talks</h1>
        <p class="text-slate-400 mt-2 tracking-widest text-xs">AI POWERED CONTENT CREATION HUB</p>
    </header>

    <main class="max-w-5xl mx-auto space-y-8">
        <div class="glass p-6 rounded-3xl shadow-xl grid md:grid-cols-2 gap-6">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Groq API Key</label>
                <input type="password" id="apiKeyInput" class="w-full mt-2 p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none transition">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Video Topic</label>
                <input type="text" id="topicInput" class="w-full mt-2 p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none transition">
            </div>
            <button onclick="generateAll()" id="genBtn" class="md:col-span-2 bg-gradient-to-r from-yellow-500 to-orange-600 text-white font-black py-4 rounded-2xl shadow-lg hover:brightness-110 transition active:scale-95 uppercase">
                Generate Full Content ⚡
            </button>
        </div>

        <div id="resultArea" class="hidden space-y-8">
            <div class="grid md:grid-cols-3 gap-8">
                <div class="md:col-span-2 glass p-8 rounded-3xl space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold text-yellow-500">📜 Burmese Script</h2>
                        <button onclick="speakScript()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full text-xs font-bold">🔊 Play AI Voice</button>
                    </div>
                    <div id="scriptText" class="text-lg leading-relaxed text-slate-200 whitespace-pre-line"></div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-xl font-bold text-orange-500">🖼️ AI Visuals</h2>
                    <div id="imageGallery" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-20">
            <div class="animate-spin w-16 h-16 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-4 text-yellow-500 font-bold animate-pulse uppercase tracking-widest text-xs">Lynn Studio is Processing...</p>
        </div>
    </main>

    <script>
        async function generateAll() {
            const apiKey = document.getElementById('apiKeyInput').value;
            const topic = document.getElementById('topicInput').value;
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('genBtn');

            if(!apiKey || !topic) return alert("Fill all fields!");

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            try {
                // 1. Generate Script and Image Prompts using Groq
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "You are an elite scriptwriter. Write a 1-minute emotional Burmese script. Then, provide 2 highly descriptive cinematic English image prompts. Separate them with '---'." },
                                   { role: "user", content: `Topic: ${topic}` }]
                    })
                });

                const data = await response.json();
                const [script, promptsPart] = data.choices[0].message.content.split('---');
                
                document.getElementById('scriptText').innerText = script.trim();

                // 2. Generate Images using Pollinations AI (Free)
                const promptLines = promptsPart.trim().split('\n').filter(l => l.length > 5).slice(0, 2);
                const gallery = document.getElementById('imageGallery');
                gallery.innerHTML = '';

                promptLines.forEach((p, index) => {
                    const encodedPrompt = encodeURIComponent(p.trim());
                    const imgUrl = `https://pollinations.ai/p/${encodedPrompt}?width=1080&height=1920&seed=${Math.floor(Math.random()*1000)}&model=flux`;
                    gallery.innerHTML += `
                        <div class="relative group">
                            <img src="${imgUrl}" class="rounded-2xl shadow-lg border border-slate-700 w-full aspect-[9/16] object-cover" alt="AI Image">
                            <a href="${imgUrl}" target="_blank" class="absolute bottom-2 right-2 bg-black/50 p-2 rounded-lg text-[10px]">Download</a>
                        </div>
                    `;
                });

                resArea.classList.remove('hidden');
            } catch (error) {
                alert("Error! Check your API Key.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function speakScript() {
            const text = document.getElementById('scriptText').innerText;
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'my-MM'; // Sets to Burmese if available on device
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
