<script>
    async function generateGeminiScript() {
        const key = document.getElementById('apiKeyInput').value;
        const topic = document.getElementById('topicInput').value;
        const output = document.getElementById('outputText');
        const resArea = document.getElementById('resultArea');
        const loader = document.getElementById('loader');

        if(!key || !topic) return alert("Key နဲ့ Topic ထည့်ပေးပါ");

        loader.classList.remove('hidden');
        resArea.classList.add('hidden');

        // Thinking Level မြင့်မားတဲ့ Gemini 1.5 Pro Model ကို သုံးပါမယ်
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `မင်းက မြန်မာစာပေနဲ့ စိတ်ပညာကို ကျွမ်းကျင်တဲ့ Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ 
                            Topic: "${topic}" အပေါ်မှာ ရင်ထဲကို တိုက်ရိုက်ထိမှန်စေမယ့် ၁ မိနစ်စာ Script ရေးပေးပါ။
                            
                            ညွှန်ကြားချက်များ-
                            ၁။ စက်ရုပ်လို ဘာသာပြန်စာသားမျိုး လုံးဝမဖြစ်စေရ။ (သည်၊ ပါသည် လုံးဝမသုံးရ)။
                            ၂။ စကားပြော style (တယ်၊ ခဲ့တယ်၊ နေတယ်) ကိုပဲ သုံးပါ။
                            ၃။ နားထောင်သူက သူ့ဘေးမှာ တစ်ယောက်ယောက်က အားပေးနေသလိုမျိုး ခံစားရစေရမယ်။
                            ၄။ စကားလုံး အထားအသိုကို ပါမောက္ခတစ်ယောက်လို စာသားအလှအပ သုံးပြီး ရေးပေးပါ။`
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.9, // ပိုပြီး သဘာဝကျပြီး အနုစိပ်စေရန်
                        topP: 0.95
                    }
                })
            });

            const data = await response.json();
            
            if (data.error) {
                alert("Error: " + data.error.message);
            } else {
                const script = data.candidates[0].content.parts[0].text;
                output.innerText = script;
                resArea.classList.remove('hidden');
            }
        } catch (error) {
            alert("ချိတ်ဆက်မှု အမှားရှိနေပါတယ်။ VPN Region (Singapore/USA) ကို စစ်ပေးပါ။");
        } finally {
            loader.classList.add('hidden');
        }
    }
</script>
