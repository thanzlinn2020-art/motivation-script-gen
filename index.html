<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivational Script Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; }
    </style>
</head>
<body class="bg-[#1a1c2e] text-gray-200 min-h-screen p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-[#242745] p-6 md:p-10 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-center mb-2 text-white">Motivational Script Generator</h1>
        <p class="text-center text-gray-400 mb-8 text-sm">Generate 1-minute Burmese motivational storytelling scripts</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Groq API Key</label>
                <input type="password" id="apiKeyInput" placeholder="gsk_..." 
                       class="w-full p-3 rounded bg-[#13152a] border border-gray-600 focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Topic</label>
                <input type="text" id="topicInput" placeholder="ဥပမာ - Never Give Up" 
                       class="w-full p-3 rounded bg-[#13152a] border border-gray-600 focus:outline-none focus:border-blue-500 transition text-white">
            </div>

            <button onclick="generateScript()" id="genBtn"
                    class="w-full bg-white text-gray-900 font-bold py-3 rounded hover:bg-gray-200 transition duration-200 uppercase tracking-widest text-sm">
                Generate Script
            </button>
        </div>

        <div class="mt-8">
            <div class="relative">
                <textarea id="outputArea" readonly rows="10"
                          class="w-full p-5 rounded-lg bg-[#13152a] border border-gray-700 text-gray-300 leading-relaxed focus:outline-none"
                          placeholder="Your motivational script will appear here..."></textarea>
                <button onclick="copyText()" class="absolute top-3 right-3 bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1 rounded text-white">Copy</button>
            </div>
        </div>
    </div>

    <script>
        async function generateScript() {
            const apiKey = document.getElementById('apiKeyInput').value;
            const topic = document.getElementById('topicInput').value;
            const output = document.getElementById('outputArea');
            const btn = document.getElementById('genBtn');

            if (!apiKey || !topic) {
                alert("API Key နဲ့ Topic ကို အရင်ဖြည့်ပါ!");
                return;
            }

            btn.innerText = "Generating...";
            btn.disabled = true;
            output.value = "AI က တွေးနေပါတယ်... ခဏစောင့်ပေးပါ...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are a motivational storyteller. Write a 1-minute script in Burmese (150-180 words) with time markers. Also provide 3 AI image prompts in English at the end." },
                            { role: "user", content: `Topic: ${topic}` }
                        ]
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    output.value = data.choices[0].message.content;
                } else {
                    output.value = "Error: API Key မှားနေနိုင်ပါတယ် သို့မဟုတ် Limit ပြည့်သွားတာဖြစ်နိုင်ပါတယ်။";
                }
            } catch (error) {
                output.value = "Error: အင်တာနက်ချိတ်ဆက်မှု သို့မဟုတ် API အမှားရှိနေပါတယ်။";
            } finally {
                btn.innerText = "Generate Script";
                btn.disabled = false;
            }
        }

        function copyText() {
            const copyText = document.getElementById("outputArea");
            copyText.select();
            document.execCommand("copy");
            alert("Script ကို Copy ကူးပြီးပါပြီ!");
        }
    </script>
</body>
</html>
