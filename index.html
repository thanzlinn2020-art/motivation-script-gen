<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Pro Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@900&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .history-item { border-left: 4px solid #f97316; transition: 0.3s; }
        .history-item:hover { background: rgba(255, 255, 255, 0.05); }
        .neon-btn { background: linear-gradient(135deg, #f97316, #ef4444); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto w-full">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-500 mb-2" style="font-family: 'Inter';">LYNN STUDIO</h1>
            <p class="text-[10px] tracking-[0.4em] text-slate-500 uppercase font-black">History & Auto-Copy Enabled</p>
        </header>

        <section class="glass-card p-6 md:p-8 mb-8">
            <textarea id="topicInput" rows="2" placeholder="ဗီဒီယို အကြောင်းအရာ ရေးပါ..." 
                class="w-full bg-black/40 border border-white/10 rounded-xl p-5 text-lg text-white outline-none focus:border-orange-500 transition-all text-center"></textarea>
            
            <button onclick="runLynnAI()" id="genBtn" class="neon-btn w-full mt-6 py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95">
                Generate & Save Script 🎬
            </button>
        </section>

        <div id="loader" class="hidden text-center my-10 animate-pulse">
            <div class="inline-block w-8 h-8 border-4 border-orange-500/20 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] text-orange-400 font-bold uppercase tracking-widest">AI is creating...</p>
        </div>

        <main id="resultArea" class="hidden space-y-6 mb-12">
            <div class="glass-card p-8 relative">
                <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                    <span id="currentTitle" class="text-orange-500 font-black text-xs uppercase italic">New Script</span>
                    <button onclick="copyCurrentText()" class="bg-white/5 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-lg text-[10px] font-bold transition-all uppercase">Copy Script ✅</button>
                </div>
                <div id="mainOutput" class="text-xl leading-[2.5] text-slate-200 italic whitespace-pre-line"></div>
            </div>
        </main>

        <section id="historySection" class="space-y-4">
            <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.3em] mb-4">Saved History</h2>
            <div id="historyList" class="space-y-4">
                </div>
            <button onclick="clearHistory()" id="clearBtn" class="hidden text-[10px] text-red-500/50 hover:text-red-500 font-bold uppercase mt-4">Clear All History</button>
        </section>
    </div>

    <script>
        const API_KEY = "AIzaSyAeKPEvkZ-GWezN0RhyIGOtvbqmOi16eSE"; 

        // Load history on startup
        window.onload = displayHistory;

        async function runLynnAI() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;
            
            toggleUI(true);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Topic: "${topic}" အတွက် TikTok Script တစ်ခုကို [00:00] timestamp format နဲ့ မြန်မာလို ရေးပေးပါ။` }] }]
                    })
                });

                const data = await response.json();
                const script = data.candidates[0].content.parts[0].text;

                // Display
                document.getElementById('mainOutput').innerText = script;
                document.getElementById('currentTitle').innerText = topic;
                document.getElementById('resultArea').classList.remove('hidden');

                // Save to History
                saveToHistory(topic, script);

            } catch (e) {
                alert("ခဏနားပြီးမှ ပြန်စမ်းကြည့်ပါဦး Linn!");
            } finally {
                toggleUI(false);
            }
        }

        function toggleUI(loading) {
            document.getElementById('genBtn').disabled = loading;
            document.getElementById('loader').classList.toggle('hidden', !loading);
            if(loading) document.getElementById('resultArea').classList.add('hidden');
        }

        function saveToHistory(title, content) {
            let history = JSON.parse(localStorage.getItem('lynn_history') || "[]");
            history.unshift({ title, content, date: new Date().toLocaleString() });
            localStorage.setItem('lynn_history', JSON.stringify(history.slice(0, 10))); // Save last 10
            displayHistory();
        }

        function displayHistory() {
            const historyList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('lynn_history') || "[]");
            
            if(history.length > 0) document.getElementById('clearBtn').classList.remove('hidden');

            historyList.innerHTML = history.map((item, index) => `
                <div class="glass-card p-5 history-item group">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="text-xs font-black text-orange-500 uppercase">${item.title}</p>
                            <p class="text-[9px] text-slate-600">${item.date}</p>
                        </div>
                        <button onclick="copyHistoryItem(${index})" class="opacity-0 group-hover:opacity-100 text-[9px] bg-orange-500 text-black px-3 py-1 rounded font-bold transition-all">COPY</button>
                    </div>
                    <p class="text-sm text-slate-400 line-clamp-2 italic">${item.content}</p>
                </div>
            `).join('');
        }

        function copyCurrentText() {
            const text = document.getElementById('mainOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကို Copy ယူလိုက်ပါပြီ! ✅");
        }

        function copyHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem('lynn_history'));
            navigator.clipboard.writeText(history[index].content);
            alert("History ထဲက Script ကို Copy ယူလိုက်ပါပြီ! ✅");
        }

        function clearHistory() {
            if(confirm("History အားလုံးကို ဖျက်မှာ သေချာသလား?")) {
                localStorage.removeItem('lynn_history');
                displayHistory();
                document.getElementById('clearBtn').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
