<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Stable Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #030712; color: #f1f5f9; }
        .glass-box { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-btn { background: linear-gradient(135deg, #fb923c, #ef4444); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5">

    <h1 class="text-5xl font-black text-orange-500 mb-8 italic tracking-tighter">LYNN STUDIO</h1>

    <div class="w-full max-w-md glass-box p-8 rounded-[2rem] shadow-2xl text-center">
        <input type="text" id="topicInput" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေး..." 
               class="w-full p-4 rounded-xl bg-black border border-slate-700 text-white text-center outline-none focus:border-orange-500 mb-6">
        
        <button onclick="generateScript()" id="genBtn" 
                class="w-full gradient-btn text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase">
            Generate Script ✍️
        </button>

        <div id="loader" class="hidden mt-6 text-orange-400 font-bold animate-pulse text-xs tracking-widest">
            AI IS WRITING...
        </div>

        <div id="resultArea" class="hidden mt-8 p-5 bg-black/50 rounded-2xl border border-slate-800 text-left">
            <div id="outputText" class="text-slate-200 leading-relaxed whitespace-pre-line text-sm md:text-base italic"></div>
            <button onclick="copyText()" class="mt-4 w-full py-2 bg-slate-800 text-slate-400 rounded-lg text-[10px] font-bold uppercase tracking-widest">Copy</button>
        </div>
    </div>

    <script>
        // မင်းပေးထားတဲ့ Key အသစ်ကို ထည့်ထားပါတယ်
        const API_KEY = "AIzaSyAQVYjoYL3uIaDfCRdytAiNTheRfX8oOC4"; 

        async function generateScript() {
            const topic = document.getElementById('topicInput').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');

            if(!topic) return;

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // URL ကို v1 (Stable) အဖြစ် ပြောင်းလဲထားပါတယ်
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Write a 1-minute emotional motivational script in natural Burmese about: ${topic}. (Use 'tal', 'mal' endings)` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                    resArea.classList.remove('hidden');
                } else {
                    // အကယ်၍ Error ဖြစ်ခဲ့ရင် ဘာကြောင့်လဲဆိုတာ အတိအကျပြမယ်
                    output.innerText = "Error: " + (data.error ? data.error.message : "No response");
                    resArea.classList.remove('hidden');
                }
            } catch (e) {
                alert("VPN (Singapore/USA) ချိတ်ထားဖို့ လိုအပ်ပါတယ်ဗျာ။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Copied!");
        }
    </script>
</body>
</html>
