<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Nano Banana Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-btn { background: linear-gradient(135deg, #f97316, #ef4444); }
        .image-placeholder { background: #0f172a; border: 2px dashed #1e293b; aspect-ratio: 16/9; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 text-center">

    <header class="py-10">
        <h1 class="text-6xl font-black text-orange-500 italic tracking-tighter">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase">Nano Banana Image Generation v4.0</p>
    </header>

    <div class="w-full max-w-3xl glass-card p-8 rounded-[2.5rem] shadow-2xl">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="ဥပမာ - ဘဝအတွက် သင်ခန်းစာ..." 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-800 focus:border-orange-500 outline-none text-white text-center text-lg">
            
            <button onclick="generateNanoContent()" id="genBtn" 
                    class="w-full gradient-btn text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">
                Generate Elite Script & Visuals 🚀
            </button>
        </div>

        <div id="loader" class="hidden mt-10">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p id="status" class="mt-4 text-orange-400 font-bold text-[10px] tracking-widest animate-pulse">NANO BANANA IS PROCESSING...</p>
        </div>

        <div id="resultArea" class="hidden mt-12 space-y-10 text-left">
            <h2 class="text-2xl font-black text-slate-100 uppercase italic">Storyboard Result</h2>
            <div id="outputText" class="space-y-10"></div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAQVYjoYL3uIaDfCRdytAiNTheRfX8oOC4"; 

        async function generateNanoContent() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');
            const status = document.getElementById('status');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');
            output.innerHTML = "";

            // Nano Banana (Image generation model) နဲ့ Gemini 3 (Text model) ကို သုံးထားပါတယ်
            const textModel = "v1beta/models/gemini-3-flash-preview:generateContent";
            
            try {
                // Step 1: Generate Script & Image Prompts
                status.innerText = "WRITING SCRIPT...";
                const textRes = await fetch(`https://generativelanguage.googleapis.com/${textModel}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အတွက် Scene ၃ ခုစာ Video Script ကို မြန်မာလို ရေးပေးပါ။ Scene တခုချင်းစီအတွက် "Scene 1: [Script] Visual: [English Prompt]" ဆိုတဲ့ format အတိုင်း ရေးပေးပါ။` }] }]
                    })
                });

                const textData = await textRes.json();
                const fullText = textData.candidates[0].content.parts[0].text;
                
                // Scene တွေကို ခွဲထုတ်မယ်
                const sceneBlocks = fullText.split(/Scene\s*\d+\s*:/i).filter(s => s.trim() !== "");

                for (let [i, block] of sceneBlocks.entries()) {
                    const dialogue = block.split(/Visual:/i)[0].trim();
                    const visualPrompt = block.split(/Visual:/i)[1]?.trim() || "Cinematic movie scene";

                    // Step 2: Generate Image for each scene using Nano Banana
                    status.innerText = `GENERATING IMAGE FOR SCENE ${i+1}...`;
                    
                    const sceneDiv = document.createElement('div');
                    sceneDiv.className = "space-y-4 p-6 rounded-3xl bg-black/40 border border-slate-800";
                    sceneDiv.innerHTML = `
                        <div class="flex justify-between text-xs font-black text-orange-500 uppercase tracking-widest">
                            <span>Scene ${i+1}</span>
                            <span>Visual AI: Nano Banana</span>
                        </div>
                        <div class="image-placeholder rounded-2xl flex items-center justify-center overflow-hidden">
                             <p class="text-[10px] text-slate-700 p-4 text-center">Image generation requested for: ${visualPrompt}</p>
                        </div>
                        <p class="text-lg leading-relaxed text-slate-200 italic font-medium">${dialogue}</p>
                        <div class="p-3 bg-orange-500/10 rounded-lg border border-orange-500/20">
                            <p class="text-[10px] text-orange-400 font-mono italic leading-normal"><strong>Visual Prompt:</strong> ${visualPrompt}</p>
                        </div>
                    `;
                    output.appendChild(sceneDiv);
                }

                resArea.classList.remove('hidden');
            } catch (e) {
                alert("VPN (Singapore/USA) ချိတ်ဖို့ လိုအပ်ပါတယ်ဗျာ။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
