<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #000; color: #fff; }
        .tiktok-vibe { background: #111; border: 1px solid #222; border-radius: 2rem; }
        .img-9-16 { width: 100%; aspect-ratio: 9/16; background: #0a0a0a; border-radius: 1.5rem; object-cover: cover; border: 1px solid #333; }
        .gradient-btn { background: linear-gradient(to right, #00f2ea, #ff0050); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="py-8 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter text-white">LYNN STUDIO</h1>
        <div class="h-1 w-20 gradient-btn mx-auto mt-2 rounded-full"></div>
    </header>

    <div class="w-full max-w-md tiktok-vibe p-6 mb-10">
        <input type="text" id="topicInput" placeholder="TikTok Topic..." 
               class="w-full p-4 rounded-xl bg-black border border-white/10 text-white text-center mb-4 outline-none">
        <button onclick="generateFinal()" id="genBtn" 
                class="w-full gradient-btn text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs active:scale-95 transition-all">
            Generate Storyboard
        </button>
    </div>

    <div id="loader" class="hidden mb-10 text-cyan-400 text-[10px] font-bold animate-pulse">RENDERING SCENES...</div>

    <div id="resultArea" class="hidden w-full max-w-md space-y-16 pb-20 text-left">
        <div id="sceneContainer" class="space-y-20"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyAQVYjoYL3uIaDfCRdytAiNTheRfX8oOC4"; 

        async function generateFinal() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const container = document.getElementById('sceneContainer');

            btn.disabled = true;
            loader.classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            container.innerHTML = "";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Creator ပါ။ Topic: "${topic}" အတွက် TikTok Scene ၃ ခုစာ Storyboard ရေးပေးပါ။ format က - Scene 1 Script: [စာ] Visual: [Short English Subject] အတိုင်းပဲ ရေးပေးပါ။` }] }]
                    })
                });

                const data = await res.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const scenes = rawText.split(/Scene\s*\d+\s*/i).filter(s => s.trim() !== "");

                scenes.forEach((scene, i) => {
                    const script = scene.split(/Visual:/i)[0].replace(/Script:/i, '').trim();
                    const visual = scene.split(/Visual:/i)[1]?.trim() || "cinematic movie scene";
                    
                    // Pollinations image with a backup seed and direct width/height
                    const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(visual + ", 8k, cinematic, portrait")}?width=1080&height=1920&seed=${Math.floor(Math.random()*1000)}`;

                    container.innerHTML += `
                        <div class="space-y-6">
                            <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Scene ${i+1}</h3>
                            <img src="${imgUrl}" class="img-9-16 shadow-2xl" onerror="this.src='https://source.unsplash.com/1080x1920/?movie,${encodeURIComponent(visual)}'">
                            <div class="p-5 rounded-2xl bg-white/5 border border-white/5">
                                <p class="text-lg leading-relaxed text-slate-200 italic font-medium">${script}</p>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) {
                alert("VPN (Singapore/USA) လိုအပ်ပါတယ်။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
