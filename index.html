<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Motivation Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">

<div class="max-w-2xl w-full bg-zinc-900 p-8 rounded-xl">

<h1 class="text-3xl font-bold text-center mb-2">
AI Motivation Script Generator
</h1>

<p class="text-gray-400 text-center mb-6">
Generate 1-Minute Burmese Motivation Scripts
</p>

<input
id="apikey"
class="w-full p-3 mb-3 rounded bg-zinc-800 border border-zinc-700"
placeholder="Paste Gemini API Key"
/>

<input
id="topic"
class="w-full p-3 mb-4 rounded bg-zinc-800 border border-zinc-700"
placeholder="Enter topic (Example: Never give up)"
/>

<button
onclick="generateScript()"
class="w-full bg-white text-black p-3 rounded font-semibold">
Generate Script
</button>

<div class="mt-6 bg-zinc-800 p-4 rounded relative">

<button
onclick="copyScript()"
class="absolute top-2 right-2 bg-white text-black text-xs px-3 py-1 rounded">
Copy
</button>

<pre id="result" class="whitespace-pre-wrap">
Your script will appear here...
</pre>

</div>

</div>

<script>

async function generateScript(){

const apiKey=document.getElementById("apikey").value
const topic=document.getElementById("topic").value
const result=document.getElementById("result")

if(!apiKey){
alert("Enter Gemini API key")
return
}

if(!topic){
alert("Enter topic")
return
}

result.textContent="Generating..."

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

contents:[{

parts:[{
text:`You are a motivational speaker.

Write a 1-minute storytelling script in Burmese.

Topic: ${topic}

Structure:
Hook
Struggle story
Lesson
CTA

Length: 150-180 words.

Include time markers like [00:00], [00:10], [00:20].
`
}]

}]

})
}
)

const data=await response.json()

const text=data.candidates?.[0]?.content?.parts?.[0]?.text

result.textContent=text || "Error generating script."

}catch(error){

result.textContent="Error: "+error.message

}

}

function copyScript(){

const text=document.getElementById("result").textContent

navigator.clipboard.writeText(text)

alert("Copied!")

}

</script>

</body>
</html>
