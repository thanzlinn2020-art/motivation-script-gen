<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | Professional Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #030712; color: #f1f5f9; }
        .glass-panel { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(135deg, #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scene-card { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.03); }
        .prompt-box { background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.2); color: #fb923c; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 text-center">

    <header class="py-12 text-center">
        <h1 class="text-6xl font-black gradient-text uppercase tracking-tighter italic">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase">Pro Storyboard & Visual Engine</p>
    </header>

    <div class="w-full max-w-4xl glass-panel p-10 rounded-[2.5rem] shadow-2xl border border-slate-800">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေးအတွက် 'သီအိုရီ' တစ်ခု..." 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-800 focus:border-orange-500 outline-none transition text-white text-center text-lg placeholder:text-slate-800">
            
            <button onclick="generateProStoryboard()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95 uppercase tracking-widest text-sm hover:brightness-110">
                Generate Professional Storyboard ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-12 text-center">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-orange-400 font-bold text-[10px] tracking-widest animate-pulse uppercase">AI is writing & visualizing...</p>
        </div>

        <div id="resultArea" class="hidden mt-12 space-y-8 text-left">
            <h2 class="text-3xl font-black text-slate-100 uppercase tracking-tighter">Storyboard Result</h2>
            <div id="outputText" class="space-y-8"></div>
            <button onclick="copyToClipboard()" class="mt-8 w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl text-[10px] font-bold transition uppercase tracking-widest">Copy Master Storyboard</button>
        </div>
    </div>

    <script>
        // မင်းရဲ့ API Key ပါ
        const API_KEY = "AIzaSyAQVYjoYL3uIaDfCRdytAiNTheRfX8oOC4"; 

        async function generateProStoryboard() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');
            output.innerHTML = ""; // အဟောင်းတွေကို ဖြတ်မယ်

            // Gemini Pro URL (v1 beta version)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Pro Storyteller ပါ။ Topic: "${topic}" အပေါ်မှာ ရင်ထဲရောက်မယ့် ၁ မိနစ်စာ Video Script ကို Professional ဆန်ဆန် Scene-by-Scene Breakdown လုပ်ပြီး ရေးပေးပါ။ (သည်၊ ပါသည် မသုံးပါနဲ့၊ သူငယ်ချင်းအချင်းချင်း ပြောပြနေသလို စကားပြော style ပဲ သုံးပါ)` }] }],
                        generationConfig: {
                            temperature: 0.9,
                            topP: 1.0,
                            topK: 1
                        }
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0]) {
                    const fullScript = data.candidates[0].content.parts[0].text;
                    parseAndDisplayScript(fullScript);
                } else {
                    output.innerText = "Error: Check VPN (Singapore/USA).";
                }
            } catch (e) {
                output.innerText = "Connection Error. Check your internet.";
            } finally {
                resArea.classList.remove('hidden');
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // Script ကို Parse လုပ်ပြီး Scene တွေအလိုက် ပြသတဲ့ function
        function parseAndDisplayScript(fullScript) {
            const outputText = document.getElementById('outputText');
            const scenes = fullScript.split(/Scene\s*\d+\s*:/i).filter(s => s.trim() !== "");

            scenes.forEach((scene, index) => {
                const lines = scene.trim().split('\n');
                let dialogue = "";
                let visual = "";

                lines.forEach(line => {
                    if (line.toLowerCase().startsWith('dialogue:')) {
                        dialogue = line.replace(/dialogue:/i, '').trim();
                    } else if (line.toLowerCase().startsWith('visual:')) {
                        visual = line.replace(/visual:/i, '').trim();
                    } else if (dialogue === "" && visual === "") {
                        dialogue = line.trim(); // Dialogue as fallback
                    }
                });

                const sceneHtml = `
                    <div class="scene-card p-8 rounded-3xl border border-slate-800 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-black text-orange-500 uppercase tracking-widest">Scene ${index + 1}</span>
                            <span class="text-xs text-slate-700 uppercase">~10-15s</span>
                        </div>
                        <p class="text-lg md:text-xl leading-[2.2] text-slate-100 font-medium whitespace-pre-line italic">${dialogue}</p>
                        ${visual ? `
                        <div class="prompt-box p-4 rounded-xl text-xs font-mono">
                            <span class="font-bold text-orange-400">Visual Prompt:</span> ${visual}
                        </div>
                        ` : ''}
                    </div>
                `;
                outputText.innerHTML += sceneHtml;
            });
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Master Storyboard Copied!");
        }
    </script>
</body>
</html>
