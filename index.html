<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #fb923c, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 text-center">

    <header class="mb-8 text-center">
        <h1 class="text-6xl font-black gradient-text uppercase tracking-tighter italic leading-none">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase italic">Universal AI Connector v2.0</p>
    </header>

    <div class="w-full max-w-2xl glass p-8 rounded-[2rem] shadow-2xl border border-slate-800">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="ဥပမာ - ဘဝအတွက် သင်ခန်းစာ..." 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-700 focus:border-orange-500 outline-none transition text-white text-center text-lg">
            
            <button onclick="startGeneration()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95 uppercase tracking-widest text-sm">
                Generate Master Script ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-10">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p id="statusMsg" class="mt-4 text-orange-400 font-bold text-[10px] tracking-widest animate-pulse uppercase">AI IS SEARCHING FOR MODEL...</p>
        </div>

        <div id="resultArea" class="hidden mt-10 p-6 bg-black/40 rounded-2xl border border-slate-800 text-left">
            <div id="outputText" class="text-lg md:text-xl leading-[2] text-slate-200 whitespace-pre-line italic font-medium"></div>
            <button onclick="copyToClipboard()" class="mt-6 w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl text-[10px] font-bold transition uppercase">Copy Master Script</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDJODUNA25KgZ-oYMDf57VG54JI5QIStII"; 

        async function startGeneration() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');
            const status = document.getElementById('statusMsg');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // Model အမျိုးအစား List ကို တစ်ခုပြီးတစ်ခု စမ်းသပ်မည့်စနစ်
            const endpoints = [
                "v1beta/models/gemini-pro",
                "v1beta/models/gemini-1.5-flash",
                "v1/models/gemini-pro",
                "v1/models/gemini-1.5-flash",
                "v1beta/models/gemini-1.0-pro"
            ];

            let success = false;
            let finalScript = "";

            for (let path of endpoints) {
                status.innerText = `Trying Model: ${path.split('/').pop()}...`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${path}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အပေါ်မှာ ရင်ထဲရောက်မယ့် ၁ မိနစ်စာ Video Script တစ်ခု ရေးပေးပါ။ (သည်၊ ပါသည် မသုံးပါနဲ့၊ စကားပြော style ပဲ သုံးပါ)` }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0]) {
                        finalScript = data.candidates[0].content.parts[0].text;
                        success = true;
                        break; // တစ်ခုအောင်မြင်ရင် loop ကနေ ထွက်မယ်
                    }
                } catch (e) {
                    console.log(`Failed endpoint: ${path}`);
                }
            }

            if (success) {
                output.innerText = finalScript;
            } else {
                output.innerText = "Error: All AI models are currently unavailable. \n\nဖြေရှင်းနည်း - \n၁။ VPN ကို Singapore သို့မဟုတ် USA သို့ သေချာပြောင်းပါ။ \n၂။ Google AI Studio ထဲမှာ Model တစ်ခုခုကို အရင်ရွေးပြီး Run ကြည့်ထားဖို့ လိုအပ်ပါတယ်။";
            }

            resArea.classList.remove('hidden');
            loader.classList.add('hidden');
            btn.disabled = false;
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Copied!");
        }
    </script>
</body>
</html>
