<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Motivation Creator</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body class="bg-gradient-to-br from-black via-zinc-900 to-black text-white min-h-screen flex items-center justify-center p-6">

<div class="max-w-3xl w-full glass rounded-2xl p-8">

<h1 class="text-3xl font-bold text-center mb-2">
AI Motivation Creator
</h1>

<p class="text-gray-400 text-center mb-8">
Generate viral Burmese motivation scripts for TikTok / Shorts
</p>

<!-- API KEY -->

<div class="mb-4">
<label class="text-sm text-gray-400">Groq API Key</label>
<input id="apikey"
class="w-full p-3 rounded-lg bg-zinc-900 border border-zinc-700"
placeholder="Paste your Groq API key">
</div>

<!-- TOPIC -->

<div class="mb-4">
<label class="text-sm text-gray-400">Topic</label>

<div class="flex gap-2">
<input id="topic"
class="flex-1 p-3 rounded-lg bg-zinc-900 border border-zinc-700"
placeholder="Example: Never Give Up">

<button onclick="generateTopic()"
class="bg-zinc-700 px-4 rounded-lg hover:bg-zinc-600">
AI Topic
</button>
</div>

</div>

<!-- GENERATE SCRIPT -->

<button
onclick="generateScript()"
class="w-full bg-white text-black font-semibold py-3 rounded-lg hover:bg-gray-200 transition">
Generate Script
</button>

<!-- CAPTION -->

<button
onclick="generateCaption()"
class="w-full mt-3 bg-purple-600 text-white font-semibold py-3 rounded-lg hover:bg-purple-500 transition">
Generate TikTok Caption
</button>

<!-- RESULT -->

<div class="mt-8 glass rounded-xl p-5 relative">

<div class="absolute top-3 right-3 flex gap-2">

<button onclick="copyScript()"
class="text-xs bg-white text-black px-3 py-1 rounded hover:bg-gray-200">
Copy
</button>

<button onclick="downloadScript()"
class="text-xs bg-green-500 px-3 py-1 rounded hover:bg-green-400">
Download
</button>

</div>

<pre id="result" class="whitespace-pre-wrap text-gray-200">
Your generated content will appear here...
</pre>

</div>

</div>

<script>

async function callGroq(messages){

const apiKey = document.getElementById("apikey").value;

const response = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + apiKey
},
body:JSON.stringify({
model:"llama3-70b-8192",
messages:messages
})
});

const data = await response.json();

return data.choices?.[0]?.message?.content || "Error generating text.";

}

async function generateScript(){

const topic = document.getElementById("topic").value;
const result = document.getElementById("result");

result.textContent="Generating script...";

const text = await callGroq([

{
role:"system",
content:"You are a motivational speaker. Write a 1-minute storytelling script in Burmese. Structure it with a Hook, a Struggle story, a Lesson, and a CTA. Total words: 150-180."
},

{
role:"user",
content:`Topic: ${topic}. Include time markers like [00:00], [00:10], etc.`
}

]);

result.textContent=text;

}

async function generateTopic(){

const result = document.getElementById("result");

result.textContent="Generating viral topic...";

const text = await callGroq([

{
role:"system",
content:"You generate viral motivational video topics."
},

{
role:"user",
content:"Give me 5 viral motivational video topics in Burmese."
}

]);

result.textContent=text;

}

async function generateCaption(){

const topic = document.getElementById("topic").value;
const result = document.getElementById("result");

result.textContent="Generating caption...";

const text = await callGroq([

{
role:"system",
content:"You create viral TikTok captions."
},

{
role:"user",
content:`Write a viral TikTok caption in Burmese for a motivational video about: ${topic}`
}

]);

result.textContent=text;

}

function copyScript(){

const text=document.getElementById("result").textContent;

navigator.clipboard.writeText(text);

alert("Copied!");

}

function downloadScript(){

const text=document.getElementById("result").textContent;

const blob=new Blob([text],{type:"text/plain"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download="motivation-script.txt";

a.click();

}

</script>

</body>
</html>
