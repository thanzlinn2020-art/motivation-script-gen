<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Premium AI Director</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@900&display=swap');
        
        :root {
            --primary: #f97316;
            --accent: #ef4444;
        }

        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: #f8fafc;
            min-height: 100vh;
        }

        /* Responsive Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .neon-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(249, 115, 22, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto w-full">
        <header class="text-center mb-12 animate-fade">
            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-500" style="font-family: 'Inter';">
                LYNN STUDIO
            </h1>
            <p class="text-[10px] md:text-xs tracking-[0.5em] text-slate-500 uppercase font-bold">The Ultimate Responsive AI Director</p>
        </header>

        <section class="glass-card p-6 md:p-10 mb-12 animate-fade" style="animation-delay: 0.2s;">
            <div class="relative group">
                <textarea id="topicInput" rows="3" 
                    placeholder="ဗီဒီယိုခေါင်းစဉ် ရေးပါ... (ဥပမာ - ဘဝသင်ခန်းစာ)" 
                    class="w-full bg-black/40 border border-white/10 rounded-2xl p-6 text-lg md:text-xl text-white placeholder:text-slate-600 focus:outline-none focus:border-orange-500/50 transition-all text-center"></textarea>
            </div>
            
            <button onclick="runLynnAI()" id="genBtn" class="neon-btn w-full mt-8 py-5 rounded-2xl font-black text-xs md:text-sm uppercase tracking-widest active:scale-95">
                Generate Elite Script 🎬
            </button>
        </section>

        <div id="loader" class="hidden text-center my-12 animate-pulse">
            <div class="inline-block w-10 h-10 border-4 border-orange-500/20 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] text-orange-400 font-bold uppercase tracking-widest">AI is crafting your story...</p>
        </div>

        <main id="resultArea" class="hidden space-y-8 animate-fade" style="animation-delay: 0.4s;">
            <div class="glass-card p-8 md:p-12 relative overflow-hidden">
                <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                    <span class="text-orange-500 font-black text-xs uppercase italic tracking-widest">Director's Script</span>
                    <button onclick="copyScript()" class="text-[10px] font-bold text-slate-500 hover:text-orange-400 transition-colors uppercase">Copy Script</button>
                </div>
                <div id="mainOutput" class="text-xl md:text-2xl leading-[2.4] md:leading-[2.8] text-slate-200 font-medium italic whitespace-pre-line custom-scrollbar">
                    </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "AIzaSyAeKPEvkZ-GWezN0RhyIGOtvbqmOi16eSE"; 

        async function runLynnAI() {
            const topic = document.getElementById('topicInput').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const output = document.getElementById('mainOutput');
            const resultArea = document.getElementById('resultArea');

            if(!topic) return;
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const modelEndpoints = ["gemini-1.5-flash", "gemini-3-flash-preview"];
            let success = false;

            for (let modelName of modelEndpoints) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အတွက် TikTok Script တစ်ခုကို [00:00] timestamp format နဲ့ မြန်မာလို ရေးပေးပါ။` }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0]) {
                        output.innerText = data.candidates[0].content.parts[0].text;
                        success = true;
                        break;
                    }
                } catch (e) { console.error("Switching model..."); }
            }

            if (success) {
                resultArea.classList.remove('hidden');
            } else {
                alert("🚨 ခဏနားပြီးမှ ပြန်စမ်းကြည့်ပါဦး Linn!");
            }

            loader.classList.add('hidden');
            btn.disabled = false;
        }

        function copyScript() {
            const text = document.getElementById('mainOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကို Copy ကူးလိုက်ပါပြီ! ✅");
        }
    </script>
</body>
</html>
