<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | Realistic AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Pyidaungsu', sans-serif; background: #030712; color: #f1f5f9; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #fb923c, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; rounded: 3px; }
    </style>
</head>
<body class="min-h-screen p-3 md:p-6 lg:p-10">

    <header class="max-w-6xl mx-auto text-center mb-10 mt-6">
        <h1 class="text-6xl font-black gradient-text tracking-tighter uppercase leading-none">Lynn Movie Talks</h1>
        <p class="text-slate-500 mt-3 tracking-[0.2em] text-xs font-bold">REALISTIC CONTENT CREATION HUB</p>
    </header>

    <main class="max-w-6xl mx-auto space-y-6">
        <div class="glass p-5 rounded-3xl shadow-2xl grid md:grid-cols-2 gap-5 border border-slate-800">
            <div>
                <label class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Groq API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Enter API Key" 
                       class="w-full mt-2 p-4 rounded-xl bg-[#030712] border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition text-sm">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Video Topic</label>
                <input type="text" id="topicInput" placeholder="e.g. Failure leads to success" 
                       class="w-full mt-2 p-4 rounded-xl bg-[#030712] border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition text-sm text-white">
            </div>
            <button onclick="generateAll()" id="genBtn" 
                    class="md:col-span-2 bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-4 rounded-xl shadow-lg hover:from-orange-600 hover:to-red-700 transition duration-300 active:scale-95 uppercase tracking-widest text-xs">
                Generate Full Content ⚡
            </button>
        </div>

        <div id="resultArea" class="hidden grid md:grid-cols-3 gap-6">
            <div class="md:col-span-2 glass p-8 rounded-3xl space-y-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-slate-800 pb-5">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        📜 <span class="gradient-text">Video Script (Natural Burmese)</span>
                    </h2>
                    <button onclick="copyScript()" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-full transition">Copy</button>
                </div>
                <div id="scriptText" class="text-base md:text-lg leading-relaxed text-slate-200 whitespace-pre-line custom-scrollbar max-h-[500px] overflow-y-auto pr-3 font-pyidaungsu"></div>
            </div>

            <div class="glass p-6 rounded-3xl">
                <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    🖼️ <span class="gradient-text">Realistic Visuals (Portrait)</span>
                </h2>
                <div id="imageGallery" class="space-y-5">
                    </div>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-20">
            <div class="animate-spin w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-5 text-orange-400 font-bold animate-pulse uppercase tracking-widest text-xs">Generating realistic content...</p>
        </div>
    </main>

    <footer class="text-center py-10 mt-10 text-slate-700 text-[10px] tracking-widest border-t border-slate-900">
        &copy; 2026 LYNN MOVIE TALKS | POWERED BY GROQ & POLLINATIONS AI
    </footer>

    <script>
        async function generateAll() {
            const apiKey = document.getElementById('apiKeyInput').value;
            const topic = document.getElementById('topicInput').value;
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const btn = document.getElementById('genBtn');

            if(!apiKey || !topic) return alert("Please fill all fields!");

            btn.disabled = true;
            btn.innerText = "Processing...";
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            try {
                // 1. Generate Script and Image Prompts using Groq (Optimized for Realism)
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        temperature: 0.8, // Slightly more creative for natural flow
                        messages: [{ role: "system", content: "You are a realistic motivational storyteller for Lynn Movie Talks. Generate a 1-minute emotional script in natural, conversational, heartfelt Burmese. Avoid formal words. Make it sound like a friend talking. Then, provide 2 highly detailed, photographic English image prompts that specify realistic features, lighting, and a portrait (9:16) aspect ratio. Separate them with '---'." },
                                   { role: "user", content: `Topic: ${topic}` }]
                    })
                });

                const data = await response.json();
                const [script, promptsPart] = data.choices[0].message.content.split('---');
                
                document.getElementById('scriptText').innerText = script.trim();

                // 2. Generate Images using Pollinations AI (Flux Model - Realistic)
                const promptLines = promptsPart.trim().split('\n').filter(l => l.length > 5).slice(0, 2);
                const gallery = document.getElementById('imageGallery');
                gallery.innerHTML = '';

                promptLines.forEach((p, index) => {
                    const enhancedPrompt = `${p.trim()}, ultra realistic, dynamic lighting, cinematic, photographic quality, no text, 9:16 portrait ratio`;
                    const encodedPrompt = encodeURIComponent(enhancedPrompt);
                    const imgUrl = `https://pollinations.ai/p/${encodedPrompt}?width=1080&height=1920&seed=${Math.floor(Math.random()*10000)}&model=flux`;
                    gallery.innerHTML += `
                        <div class="relative group overflow-hidden rounded-xl border border-slate-800 shadow-xl">
                            <img src="${imgUrl}" class="w-full aspect-[9/16] object-cover transition-transform duration-300 group-hover:scale-105" alt="AI Image">
                            <a href="${imgUrl}" target="_blank" class="absolute top-2 right-2 bg-black/70 p-2 rounded-lg text-[10px] text-white backdrop-blur-sm">HD</a>
                        </div>
                    `;
                });

                resArea.classList.remove('hidden');
            } catch (error) {
                alert("Something went wrong. Check your API Key.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                btn.innerText = "Generate Full Content ⚡";
            }
        }

        function copyScript() {
            const text = document.getElementById('scriptText').innerText;
            navigator.clipboard.writeText(text);
            alert("Script copied!");
        }
    </script>
</body>
</html>
