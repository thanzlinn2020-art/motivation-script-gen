<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #fb923c, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 text-center">

    <header class="mb-10">
        <h1 class="text-6xl font-black gradient-text uppercase tracking-tighter italic">LYNN STUDIO</h1>
        <p class="text-slate-500 mt-2 text-[10px] tracking-[0.4em] font-bold uppercase">Ready to Generate</p>
    </header>

    <div class="w-full max-w-2xl glass p-10 rounded-[2.5rem] shadow-2xl border border-slate-800">
        <div class="space-y-6">
            <input type="text" id="topicInput" placeholder="Enter topic (e.g. Never Give Up)" 
                   class="w-full p-5 rounded-2xl bg-black border border-slate-800 focus:border-orange-500 outline-none transition text-white text-center text-lg">
            
            <button onclick="generateScript()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all uppercase tracking-widest active:scale-95">
                Generate Elite Script ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-12 text-center">
            <div class="inline-block w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-orange-500 font-bold text-[10px] tracking-widest animate-pulse uppercase">AI is responding...</p>
        </div>

        <div id="resultArea" class="hidden mt-12 p-8 bg-black/40 rounded-[2rem] border border-slate-800">
            <div id="outputText" class="text-lg md:text-xl leading-[2.2] text-slate-200 whitespace-pre-line text-left font-medium"></div>
            <button onclick="copyToClipboard()" class="mt-8 w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl text-xs font-bold transition uppercase">Copy</button>
        </div>
    </div>

    <script>
        // မင်းပေးထားတဲ့ Key အသစ်ကို ထည့်သွင်းထားပါတယ်
        const API_KEY = "AIzaSyDJODUNA25KgZ-oYMDf57VG54JI5QIStII"; 

        async function generateScript() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('outputText');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // API ချိတ်ဆက်မှု အသေချာဆုံးပုံစံ (v1 version)
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Write a 1-minute motivational script in natural Burmese about: ${topic}. (Don't use formal 'thee/par thee')` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // ဘာလို့ Error တက်လဲဆိုတာ အသေးစိတ်ပြပါမယ်
                    output.innerText = "Error: " + data.error.message + "\n\nReason: " + (data.error.status || "Unknown");
                } else if (data.candidates && data.candidates[0]) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    output.innerText = "No response from AI. Please try again.";
                }
            } catch (e) {
                output.innerText = "Connection Failed. Make sure your VPN is set to Singapore or USA.";
            } finally {
                resArea.classList.remove('hidden');
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('outputText').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
