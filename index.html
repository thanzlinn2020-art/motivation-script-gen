<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Movie Talks | Master Copywriter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .border-gradient { border: 1px solid; border-image-source: linear-gradient(to right, #f59e0b, #ef4444); border-image-slice: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="text-center my-10">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-600 uppercase">Lynn Movie Talks</h1>
        <p class="text-gray-500 mt-2 tracking-widest text-xs uppercase">Powered by Gemini AI (Pro Language Model)</p>
    </header>

    <div class="w-full max-w-2xl bg-[#121212] p-8 rounded-3xl shadow-2xl border border-gray-800">
        <div class="space-y-5">
            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Gemini API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API Key here" 
                       class="w-full mt-1 p-4 rounded-xl bg-black border border-gray-700 focus:border-orange-500 outline-none transition">
            </div>
            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Video Topic</label>
                <input type="text" id="topicInput" placeholder="ဥပမာ - ဘယ်တော့မှ လက်မလျှော့နဲ့..." 
                       class="w-full mt-1 p-4 rounded-xl bg-black border border-gray-700 focus:border-orange-500 outline-none text-white">
            </div>
            <button onclick="generateGeminiScript()" id="genBtn" 
                    class="w-full bg-gradient-to-r from-orange-600 to-red-700 text-white font-bold py-4 rounded-xl hover:scale-[1.02] transition active:scale-95 uppercase tracking-widest shadow-lg">
                Generate Elite Script ✍️
            </button>
        </div>

        <div id="loader" class="hidden mt-10 text-center">
            <div class="animate-spin h-8 w-8 border-4 border-orange-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-4 text-orange-500 text-sm italic">Gemini က အကောင်းဆုံး မြန်မာစာသားတွေ ရေးနေပါတယ်...</p>
        </div>

        <div id="resultArea" class="hidden mt-10 p-6 bg-black rounded-2xl border border-gray-800">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold text-gray-500 uppercase">Burmese Script Result</span>
                <button onclick="copyToClipboard()" class="text-[10px] bg-gray-800 px-3 py-1 rounded text-gray-300">Copy</button>
            </div>
            <div id="outputText" class="text-lg leading-[1.9] text-gray-100 whitespace-pre-line"></div>
        </div>
    </div>

    <script>
        async function generateGeminiScript() {
            const key = document.getElementById('apiKeyInput').value;
            const topic = document.getElementById('topicInput').value;
            const output = document.getElementById('outputText');
            const resArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');

            if(!key || !topic) return alert("Key နဲ့ Topic ထည့်ပေးပါဗျာ");

            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `မင်းက Lynn Movie Talks ရဲ့ အကောင်းဆုံး မြန်မာစာရေးဆရာတစ်ယောက်ပါ။ 
                                အောက်ပါ Topic အပေါ်မှာ ၁ မိနစ်စာ Video Script တစ်ခု ရေးပေးပါ။
                                စည်းကမ်းချက်များ-
                                ၁။ လုံးဝ (လုံးဝ) စာအုပ်ကြီးစကားလုံးတွေဖြစ်တဲ့ 'သည်'၊ 'ပါသည်'၊ 'ပြုလုပ်သည်' တွေကို မသုံးပါနဲ့။ 
                                ၂။ သူငယ်ချင်းတစ်ယောက်က ဘေးနားမှာ ပြောပြနေသလိုမျိုး 'တယ်'၊ 'ခဲ့တယ်'၊ 'နေတယ်' စတဲ့ သဘာဝကျတဲ့ စကားပြော style ကိုပဲ သုံးပါ။
                                ၃။ စာသားတွေက ရင်ထဲရောက်ရမယ်၊ စိတ်လှုပ်ရှားမှု ပါရမယ်၊ မြန်မာစာ အသုံးအနှုန်း မှန်ကန်ပြီး နားဝင်ချိုရမယ်။
                                ၄။ ခေါင်းစဉ် (Hook) ကနေ နိဂုံးအထိ စွဲဆောင်မှုရှိပါစေ။
                                Topic: ${topic}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const script = data.candidates[0].content.parts[0].text;
                output.innerText = script;
                resArea.classList.remove('hidden');
            } catch (error) {
                alert("API Key မှားနေပုံရပါတယ်။ ပြန်စစ်ပေးပါဦး။");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကူးပြီးပါပြီ။");
        }
    </script>
</body>
</html>
