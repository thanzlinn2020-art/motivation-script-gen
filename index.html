<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Gemini 3 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@800&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .neon-btn { background: linear-gradient(135deg, #f97316, #ef4444); box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="py-12 text-center">
        <h1 class="text-5xl font-black italic text-orange-500 mb-2" style="font-family: 'Inter';">LYNN STUDIO</h1>
        <p class="text-[9px] tracking-[0.6em] text-slate-600 uppercase font-black">Powered by Gemini 3 Flash</p>
    </header>

    <div class="w-full max-w-2xl glass p-8 mb-10">
        <textarea id="topicInput" rows="2" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေး လျှို့ဝှက်ချက်..." 
                  class="w-full p-5 rounded-2xl bg-black/50 border border-white/5 focus:border-orange-500 outline-none text-white text-center text-lg mb-6"></textarea>
        
        <button onclick="runGemini3()" id="genBtn" 
                class="w-full neon-btn text-white font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest text-xs">
            Generate Final Script 🚀
        </button>
    </div>

    <div id="loader" class="hidden mb-10 text-orange-500 font-bold animate-pulse text-[10px] uppercase text-center">Gemini 3 is Thinking...</div>

    <div id="resultArea" class="hidden w-full max-w-2xl space-y-8 pb-32">
        <div id="mainOutput" class="glass p-8 text-xl leading-[2.6] text-slate-200 font-medium italic whitespace-pre-line"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyAeKPEvkZ-GWezN0RhyIGOtvbqmOi16eSE"; 

        async function runGemini3() {
            const topic = document.getElementById('topicInput').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const output = document.getElementById('mainOutput');

            if(!topic) return;
            btn.disabled = true;
            loader.classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');

            // မင်းဆီမှာ ရှိနေတဲ့ Gemini 3 Flash Model ကို တိုက်ရိုက်ခေါ်သုံးမယ့် URL
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Director ပါ။ Topic: "${topic}" အတွက် TikTok Viral ဖြစ်မယ့် ၁ မိနစ်စာ Script ကို Timestamp [00:00] format နဲ့ မြန်မာလို ရေးပေးပါ။` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('resultArea').classList.remove('hidden');
                } else if (data.error) {
                    alert("🚨 Model Error: " + data.error.message + "\n\nAI Studio ထဲမှာ Gemini 3 Flash Model ကို အရင် Activate လုပ်ထားလား စစ်ပေးပါ။");
                }
            } catch (e) {
                alert("🚨 Connection Error: VPN ကို Singapore/USA ချိတ်ပါ။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
